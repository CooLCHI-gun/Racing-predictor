name: HKJC Racing Predictor CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    # Every 5 min HKT 09:00-22:59 (UTC 01:00-14:59)
    - cron: "*/5 1-14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "run.py mode"
        required: true
        default: "cron"
        type: choice
        options:
          - cron
          - tick
          - maintenance
          - backtest
          - optimize
          - debug
          - telegram-test

concurrency:
  group: hkjc-runner-${{ github.ref_name }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  TZ: Asia/Hong_Kong

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core deps (lighter than full requirements)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest optuna

      - name: Run regression tests
        run: |
          python -m pytest tests/ -v --timeout=60 2>&1 || true
          echo "Tests complete (non-fatal)"

  run:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'cron' }}

      # Required secrets
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Variables (with defaults)
      MESSAGE_STYLE: ${{ vars.MESSAGE_STYLE || 'pro' }}
      DEMO_MODE: ${{ vars.DEMO_MODE || 'false' }}
      REAL_DATA_ONLY: ${{ vars.REAL_DATA_ONLY || 'true' }}
      ALLOW_SYNTHETIC_TRAINING: ${{ vars.ALLOW_SYNTHETIC_TRAINING || 'false' }}
      TELEGRAM_LANGUAGE_GUARD: ${{ vars.TELEGRAM_LANGUAGE_GUARD || 'false' }}
      CRON_MAINTENANCE_HOUR: ${{ vars.CRON_MAINTENANCE_HOUR || '21' }}
      DAILY_RETRAIN_ENABLED: ${{ vars.DAILY_RETRAIN_ENABLED || 'true' }}
      HEARTBEAT_ENABLED: "true"
      OPTIMIZATION_LOOKBACK_DAYS: "120"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install optuna

      - name: Compute HKT date for cache key
        id: hkt
        shell: bash
        run: |
          HKT_DATE=$(TZ=Asia/Hong_Kong date +%F)
          echo "hkt_date=${HKT_DATE}" >> "$GITHUB_OUTPUT"

      - name: Restore runtime state + models
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            data/predictions
            data/reports
            data/models
          key: runtime-${{ github.ref_name }}-${{ steps.hkt.outputs.hkt_date }}-${{ github.run_id }}
          restore-keys: |
            runtime-${{ github.ref_name }}-${{ steps.hkt.outputs.hkt_date }}-
            runtime-${{ github.ref_name }}-

      - name: Run pipeline
        run: python run.py --mode "${RUN_MODE}"

      - name: Save runtime state + models
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/predictions
            data/reports
            data/models
          key: runtime-${{ github.ref_name }}-${{ steps.hkt.outputs.hkt_date }}-${{ github.run_id }}
